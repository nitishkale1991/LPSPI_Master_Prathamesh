lpspi_interrupt_b2b_master:
  section-type: application
  contents:
    meta_path: examples/driver_examples/lpspi/interrupt_b2b/master
    project-root-path: boards/${board}/driver_examples/lpspi/interrupt_b2b/master/${multicore_foldername}
    document:
      name: lpspi_interrupt_b2b_master${core_id_suffix_name}
      category: driver_examples/lpspi
      brief: The lpspi_interrupt_b2b example shows how to use LPSPI driver in interrupt
        way:In this example , we need two boards , one board used as LPSPI master
        and another board used as LPSPI slave.The file 'lpspi_interrupt_b2b_master.c'
        includes the LPSPI master code.This example does not use the transactional
        API in LPSPI driver. It's a demonstration that how to use the interrupt in
        KSDK driver.1. LPSPI master send/received data to/from LPSPI slave in interrupt
        . (LPSPI Slave using interrupt to receive/send the data)
      example_readme:
      - examples/driver_examples/lpspi/interrupt_b2b/master/readme.md
      - ${board_root}/${board}/driver_examples/lpspi/interrupt_b2b/master/example_board_readme.md
      - ${board_root}/${board}/examples_shared_readme.md
